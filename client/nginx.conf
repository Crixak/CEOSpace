server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA (React Router): cualquier ruta que no sea un archivo real cae en
    # index.html para que el router del cliente resuelva /carta/:branchId,
    # /ventas, /login, etc. al navegar directo o refrescar la página.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
